<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediaVault — Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1f1f24;
    --surface3: #26262c;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0eee8;
    --text2: #9a99a3;
    --text3: #5a5a65;
    --accent: #e8c547;
    --accent-dim: rgba(232,197,71,0.12);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --amber: #fb923c;
    --amber-dim: rgba(251,146,60,0.12);
    --pink: #f472b6;
    --pink-dim: rgba(244,114,182,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; }

  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--text); }
  .logo span { color: var(--accent); }

  .stats-bar { flex-shrink: 0; display: grid; grid-template-columns: repeat(4, 1fr); background: var(--surface); border-bottom: 1px solid var(--border); }
  .stat { padding: 10px 20px; text-align: center; border-right: 1px solid var(--border); }
  .stat:last-child { border-right: none; }
  .stat-n { font-family: 'Bebas Neue', sans-serif; font-size: 28px; line-height: 1; color: var(--accent); }
  .stat-l { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-top: 1px; }

  .body { flex: 1; display: flex; overflow: hidden; }
  .sidebar { flex-shrink: 0; width: 214px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px 10px; }
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* Sidebar actor search */
  .sb-search { position: relative; margin-bottom: 6px; }
  .sb-search i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  .sb-search input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 28px 7px 30px; border-radius: var(--radius); outline: none; transition: border-color 0.12s; }
  .sb-search input:focus { border-color: var(--border-hover); }
  .sb-search input.has-value { border-color: rgba(232,197,71,0.5); background: var(--accent-dim); color: var(--accent); }
  .sb-search input.has-value::placeholder { color: rgba(232,197,71,0.4); }
  .sb-search input::placeholder { color: var(--text3); }
  .sb-search .sb-search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px; display: flex; align-items: center; }
  .sb-search .sb-search-clear:hover { color: var(--text); }

  /* Sidebar */
  .sb-section { margin-bottom: 22px; }
  .sb-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 6px; padding-left: 10px; }
  .sb-btn { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; border-radius: var(--radius); cursor: pointer; text-align: left; transition: background 0.12s, color 0.12s; white-space: nowrap; overflow: hidden; }
  .sb-btn:hover { background: var(--surface2); color: var(--text); }
  .sb-btn.active { background: var(--accent-dim); color: var(--accent); }
  .sb-btn i { font-size: 15px; width: 16px; flex-shrink: 0; }
  .sb-btn-label { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .sb-count { flex-shrink: 0; font-size: 11px; color: var(--text3); background: var(--surface2); padding: 1px 7px; border-radius: 20px; }
  .sb-btn.active .sb-count { background: rgba(232,197,71,0.15); color: var(--accent); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 12px 8px 34px; border-radius: var(--radius); outline: none; transition: border-color 0.12s; }
  .search-wrap input:focus { border-color: var(--border-hover); }
  .search-wrap input::placeholder { color: var(--text3); }
  select.ctrl { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 10px; border-radius: var(--radius); outline: none; cursor: pointer; }
  select.ctrl option { background: #1f1f24; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: var(--accent); color: #0a0a0b; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; white-space: nowrap; transition: opacity 0.12s; }
  .add-btn:hover { opacity: 0.88; }

  /* Table */
  .table-wrap { border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; background: var(--surface); }
  table { width: 100%; border-collapse: collapse; table-layout: auto; }
  thead th { background: var(--surface2); font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); font-weight: 500; padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; }
  thead th.c { text-align: center; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.film-row:hover { background: var(--surface3); }
  tbody tr + tr td { border-top: 1px solid var(--border); }
  td { padding: 11px 14px; vertical-align: middle; }
  td.c { text-align: center; }

  .film-title { font-weight: 500; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .film-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .fmt { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fmt-DVD    { background: var(--blue-dim);   color: var(--blue); }
  .fmt-Blu-Ray{ background: var(--green-dim);  color: var(--green); }
  .fmt-4K     { background: var(--purple-dim); color: var(--purple); }
  .fmt-3D     { background: var(--amber-dim);  color: var(--amber); }

  .type-badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .type-Film    { background: rgba(96,165,250,0.1);  color: #60a5fa; }
  .type-TV-Show { background: rgba(167,139,250,0.1); color: #a78bfa; }

  .bs-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; color: var(--amber); background: var(--amber-dim); border: 1px solid rgba(251,146,60,0.2); padding: 1px 7px 1px 5px; border-radius: 4px; white-space: nowrap; letter-spacing: 0.3px; }
  .bs-badge i { font-size: 11px; }

  .icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 17px; padding: 4px; border-radius: 5px; line-height: 1; transition: color 0.12s, background 0.12s; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { color: var(--text); background: var(--surface3); }
  .icon-btn.on-wanted    { color: var(--amber); }
  .icon-btn.on-watchlist { color: var(--blue); }
  .icon-btn.on-favourite { color: var(--pink); }

  /* Box set grouped view */
  .bs-groups { display: flex; flex-direction: column; gap: 14px; }
  .bs-group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .bs-group-head { display: flex; align-items: center; gap: 10px; padding: 11px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .bs-group-head i { color: var(--amber); font-size: 16px; flex-shrink: 0; }
  .bs-group-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bs-group-meta { font-size: 11px; color: var(--text3); flex-shrink: 0; }
  .bs-group-edit { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px 6px; border-radius: var(--radius); font-size: 14px; display: flex; align-items: center; transition: color 0.12s, background 0.12s; }
  .bs-group-edit:hover { color: var(--text); background: var(--surface3); }

  /* Pagination */
  .pager { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; font-size: 13px; color: var(--text2); flex-wrap: wrap; gap: 10px; }
  .pages { display: flex; gap: 4px; flex-wrap: wrap; }
  .pg-btn { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 5px 11px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s, color 0.1s; line-height: 1; display: inline-flex; align-items: center; }
  .pg-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); }
  .pg-btn.active { background: var(--accent); color: #0a0a0b; border-color: var(--accent); font-weight: 500; }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty i { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border-hover); border-radius: var(--radius-lg); width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 0; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px; border-radius: 5px; line-height: 1; }
  .modal-close:hover { color: var(--text); background: var(--surface2); }
  .modal-body { padding: 20px 24px 0; }
  .fg { margin-bottom: 14px; }
  .fg label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 5px; }
  .fg input, .fg select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 12px; border-radius: var(--radius); outline: none; transition: border-color 0.12s; }
  .fg input:focus, .fg select:focus { border-color: var(--border-hover); }
  .fg select option { background: var(--surface2); }
  .fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checks { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
  .check-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); cursor: pointer; user-select: none; }
  .check-label input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .check-label:hover { color: var(--text); }

  /* Box set search picker inside film modal */
  .bs-selected-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--amber); background: var(--amber-dim); border: 1px solid rgba(251,146,60,0.25); padding: 5px 10px; border-radius: var(--radius); margin-bottom: 8px; }
  .bs-selected-chip button { background: none; border: none; color: var(--amber); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; display: flex; align-items: center; opacity: 0.7; }
  .bs-selected-chip button:hover { opacity: 1; }
  .bs-search-results { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 6px; }
  .bs-search-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); cursor: pointer; transition: background 0.1s, color 0.1s; }
  .bs-search-item:last-child { border-bottom: none; }
  .bs-search-item:hover { background: var(--surface3); color: var(--text); }
  .bs-search-item i { font-size: 14px; color: var(--text3); flex-shrink: 0; }
  .bs-search-item.create { color: var(--accent); }
  .bs-search-item.create i { color: var(--accent); }

  /* Box set management modal */
  .bs-mgmt-list { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 14px; }
  .bs-mgmt-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .bs-mgmt-row:last-child { border-bottom: none; }
  .bs-mgmt-name { flex: 1; color: var(--text); font-weight: 500; }
  .bs-mgmt-count { font-size: 11px; color: var(--text3); }
  .bs-mgmt-del { background: none; border: none; color: var(--text3); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 15px; display: flex; align-items: center; transition: color 0.12s; }
  .bs-mgmt-del:hover { color: var(--red); }
  .bs-mgmt-edit-input { flex: 1; background: var(--surface2); border: 1px solid var(--border-hover); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 5px 10px; border-radius: var(--radius); outline: none; }

  .modal-foot { display: flex; align-items: center; justify-content: flex-end; gap: 10px; padding: 16px 24px 24px; border-top: 1px solid var(--border); margin-top: 20px; }
  .del-btn { margin-right: auto; background: none; border: 1px solid rgba(248,113,113,0.3); color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 14px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.12s; }
  .del-btn:hover { background: var(--red-dim); }
  .sec-btn { background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s, color 0.12s; }
  .sec-btn:hover { background: var(--surface2); color: var(--text); }
  .pri-btn { background: var(--accent); color: #0a0a0b; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 8px 20px; border-radius: var(--radius); cursor: pointer; transition: opacity 0.12s; }
  .pri-btn:hover { opacity: 0.88; }

  /* TMDB lookup */
  .tmdb-lookup-wrap { position: relative; }
  .tmdb-results { position: absolute; top: 100%; left: 0; right: 0; z-index: 200; background: var(--surface2); border: 1px solid var(--border-hover); border-radius: var(--radius); overflow: hidden; margin-top: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); max-height: 320px; overflow-y: auto; }
  .tmdb-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .tmdb-item:last-child { border-bottom: none; }
  .tmdb-item:hover { background: var(--surface3); }
  .tmdb-item-poster { width: 32px; height: 48px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--surface3); }
  .tmdb-item-poster-blank { width: 32px; height: 48px; border-radius: 3px; flex-shrink: 0; background: var(--surface3); display:flex; align-items:center; justify-content:center; color: var(--text3); font-size:14px; }
  .tmdb-item-info { flex: 1; min-width: 0; }
  .tmdb-item-title { font-size: 13px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tmdb-item-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .tmdb-item-year { font-size: 11px; color: var(--accent); font-weight: 500; flex-shrink: 0; }
  .tmdb-loading { padding: 10px 12px; font-size: 13px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
  .tmdb-lookup-btn { flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 12px; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.12s, color 0.12s, border-color 0.12s; white-space: nowrap; }
  .tmdb-lookup-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hover); }
  .tmdb-lookup-btn:disabled { opacity: 0.4; cursor: default; }
  .tmdb-lookup-btn i { font-size: 14px; }
  /* Poster + metadata preview shown after a result is selected */
  .tmdb-selected { display: flex; gap: 12px; align-items: flex-start; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-bottom: 4px; }
  .tmdb-selected-poster { width: 52px; height: 78px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .tmdb-selected-poster-blank { width: 52px; height: 78px; border-radius: 4px; flex-shrink: 0; background: var(--surface3); display:flex; align-items:center; justify-content:center; color: var(--text3); font-size:20px; }
  .tmdb-selected-info { flex: 1; min-width: 0; }
  .tmdb-selected-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .tmdb-selected-meta { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
  .tmdb-clear { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px; line-height: 1; flex-shrink: 0; }
  .tmdb-clear:hover { color: var(--text); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .nav-tabs { display: flex; gap: 4px; align-items: center; }
  .nav-tab { background: none; border: 1px solid transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s; display: flex; align-items: center; gap: 6px; }
  .nav-tab:hover { background: var(--surface2); color: var(--text); }
  .nav-tab.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(232,197,71,0.25); }
  .nav-tab i { font-size: 15px; }

  /* All actors view */
  .all-actors-view { display: none; flex: 1; overflow-y: auto; padding: 24px; }
  .all-actors-view.visible { display: block; }
  @media (max-width: 768px) { .all-actors-view { padding: 12px; } }

  /* Dashboard */
  .dashboard { display: none; flex: 1; overflow-y: auto; padding: 24px; }
  .dashboard.visible { display: block; }
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 20px 16px; }
  .dash-card.full { grid-column: 1 / -1; }
  .dash-card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text3); margin-bottom: 16px; }
  .dash-chart-wrap { position: relative; }
  .dash-donut-wrap { display: flex; align-items: center; gap: 24px; }
  .dash-legend { display: flex; flex-direction: column; gap: 8px; min-width: 120px; }
  .dash-legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  .dash-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dash-legend-val { margin-left: auto; font-weight: 500; color: var(--text); font-size: 13px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  /* Format badge inline in title cell — only shown on mobile */
  .fmt-inline { display: none; }

  #pager-wrap-top { margin-bottom: 12px; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .filter-chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(232,197,71,0.3); background: var(--accent-dim); color: var(--accent); }
  .filter-chip button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; display: flex; align-items: center; opacity: 0.7; }
  .filter-chip button:hover { opacity: 1; }

  .cast-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; border-radius: 4px; padding: 6px 8px; margin: 0 -8px; }
  .cast-row:last-child { border-bottom: none; }
  .cast-row:hover { background: var(--surface2); }
  .cast-rank { font-size: 11px; color: var(--text3); width: 20px; text-align: right; flex-shrink: 0; }

  .cast-count { font-size: 12px; font-weight: 500; color: var(--text2); flex-shrink: 0; width: 24px; text-align: right; }

  /* ── Hamburger: hidden on desktop ── */
  .hamburger { display: none; background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; padding: 6px 8px; border-radius: var(--radius); line-height: 1; flex-shrink: 0; }
  .hamburger:hover { color: var(--text); background: var(--surface2); }

  /* ── Drawer overlay: hidden until open ── */
  .drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 199; }
  .drawer-overlay.open { display: block; }

  /* ── FAB: hidden on desktop ── */
  .fab { display: none; }

  /* ── Mobile (≤768px) ── */
  @media (max-width: 768px) {
    /* Header: two rows on mobile */
    .header {
      padding: 0;
      height: auto;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 0;
    }
    /* Row 1: hamburger + logo + sync */
    .header .hamburger { order: 1; padding: 10px 12px; }
    .header .logo      { order: 2; flex: 1; font-size: 22px; letter-spacing: 3px; }
    .header .add-btn   { display: none; }
    /* Sync status: right side of row 1 */
    .header > div:last-child {
      order: 3;
      padding-right: 12px;
      gap: 0;
    }
    .header > div:last-child .add-btn { display: none; }
    /* Row 2: nav tabs full width */
    .header .nav-tabs {
      order: 4;
      width: 100%;
      border-top: 1px solid var(--border);
      padding: 4px 8px;
      gap: 4px;
    }
    .nav-tab { flex: 1; justify-content: center; font-size: 12px; padding: 6px 8px; }

    /* Stats bar */
    .stat { padding: 8px 4px; }
    .stat-n { font-size: 20px; }
    .stat-l { font-size: 9px; }

    /* Sidebar drawer */
    .sidebar {
      position: fixed !important;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      overflow-y: auto;
      padding: 60px 10px 20px;
    }
    .sidebar.drawer-open { transform: translateX(0); }

    /* Sidebar is position:fixed so remove it from the flex flow —
       without this its 214px desktop width still squeezes .main */
    .body { display: flex; flex-direction: column; overflow: hidden; }
    .main { width: 100%; box-sizing: border-box; padding: 12px; flex: 1; overflow-y: auto; }

    /* Format badge moves into title cell on mobile */
    .fmt-inline { display: inline; }
    .hamburger { display: block; }

    /* Toolbar */
    .toolbar { flex-wrap: wrap; gap: 8px; }
    .search-wrap { width: 100%; min-width: 0; flex: none; }
    select.ctrl { flex: 1; font-size: 16px; }

    /* Table: all col visibility handled via mobile TABLE_HEAD (no colgroup) */
    .col-format, th.col-format { display: none; }
    .col-wanted, th.col-wanted,
    .col-watchlist, th.col-watchlist { display: none; }
    .col-fav, th.col-fav { display: none; }

    /* Icon buttons: bigger touch targets */
    .icon-btn { min-width: 44px; min-height: 44px; font-size: 18px; }
    td { padding: 8px 4px; }
    td:first-child { padding-left: 10px; }
    thead th { padding: 8px 4px; }
    thead th:first-child { padding-left: 10px; }

    /* FAB */
    .fab {
      display: flex; align-items: center; justify-content: center;
      position: fixed; bottom: 24px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;

      z-index: 198; box-shadow: 0 4px 18px rgba(0,0,0,0.45);
      transition: transform 0.12s;

    .fab:active { transform: scale(0.91); }

    /* Dashboard single column */
    .dash-grid { grid-template-columns: 1fr; }
    .dash-card.full { grid-column: 1; }
    .dashboard { padding: 12px; }
    .dash-donut-wrap { flex-direction: column; gap: 16px; }

    /* Modal slides up from bottom */
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal { border-radius: 12px 12px 0 0; max-height: 92vh; }
    .fg input, .fg select { font-size: 16px; }
  }

  @media (max-width: 380px) {
    .logo { font-size: 20px; letter-spacing: 2px; }
    .stat-n { font-size: 17px; }
  }

  /* Auth */
  .auth-btn { display: flex; align-items: center; gap: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 14px; border-radius: var(--radius); cursor: pointer; transition: background 0.12s, color 0.12s, border-color 0.12s; white-space: nowrap; flex-shrink: 0; }
  .auth-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border-hover); }
  .auth-btn i { font-size: 15px; }
  .auth-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .auth-wrap { position: relative; flex-shrink: 0; }
  .auth-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface2); border: 1px solid var(--border-hover); border-radius: var(--radius-lg); padding: 6px; min-width: 190px; box-shadow: 0 8px 24px rgba(0,0,0,0.45); z-index: 300; }
  .auth-menu-name { font-size: 12px; color: var(--text3); padding: 6px 10px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .auth-menu-item { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 10px; border-radius: var(--radius); cursor: pointer; text-align: left; transition: background 0.1s, color 0.1s; }
  .auth-menu-item:hover { background: var(--surface3); color: var(--text); }
  @media (max-width: 768px) {
    .auth-btn span { display: none; }
    .auth-btn { padding: 6px 10px; }
  }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--red-dim); border: 1px solid var(--red); color: var(--red); font-size: 13px; padding: 10px 20px; border-radius: var(--radius); z-index: 9999; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const GOOGLE_CLIENT_ID = '625476206146-fjk8ot2sk4tg7pml0rpk2hv04rhtc2ml.apps.googleusercontent.com';
let perPage = 15;
let films = [], boxSets = [];
let activeFilter = 'owned', activeFormat = null, activeYear = null, activeGenre = null, activeCast = null, currentPage = 1;
let editFilmId = null, editBsId = null;
// tracks selected boxset id in film modal (null = none, string = id)
let filmModalBsId = null;

// ── Storage ──
// ── Supabase config ──
const SB_URL = 'https://djkmpqxratnahyavfjau.supabase.co';
const SB_KEY = 'sb_publishable_padlTyNYJitVOJyKWBCjOQ_iipDxkLj';

// ── Auth ──
window.sbClient = supabase.createClient(SB_URL, SB_KEY);
const sbClient = window.sbClient;
let currentUser = null;
let currentAccessToken = null;
let accessDeniedShown = false;

const ALLOWED_EMAIL = 'matthewhearne@gmail.com';
const SITE_URL = 'https://matthewhearne.github.io/mediavault/';

function isAdmin() { return !!currentUser && currentUser.email === ALLOWED_EMAIL; }

function updateAuthUI(user, accessToken) {
  // Hard gate — never treat a non-whitelisted user as logged in
  currentUser = (user && user.email === ALLOWED_EMAIL) ? user : null;
  currentAccessToken = currentUser ? accessToken : null;
  const btn = document.getElementById('auth-btn');
  const headerAddBtn = document.getElementById('header-add-btn');
  const fab = document.getElementById('fab-btn');
  const isMobile = window.innerWidth <= 768;

  if (currentUser) {
    const avatarUrl = currentUser.user_metadata?.avatar_url;
    const name = currentUser.user_metadata?.full_name || currentUser.email || 'Signed in';
    btn.innerHTML = avatarUrl
      ? `<img src="${avatarUrl}" class="auth-avatar" alt=""> <span>${name.split(' ')[0]}</span>`
      : `<i class="ti ti-user-circle"></i> <span>${name.split(' ')[0]}</span>`;
    document.getElementById('auth-menu-name').textContent = name;
    headerAddBtn.style.display = isMobile ? 'none' : 'flex';
    if (isMobile) { fab.style.display = ''; }
  } else {
    btn.innerHTML = '<i class="ti ti-brand-google"></i><span>Sign in</span>';
    headerAddBtn.style.display = 'none';
    fab.style.display = 'none';
  }
  render();
}

function handleAuthClick() {
  const menu = document.getElementById('auth-menu');
  if (currentUser) {
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  } else {
    signIn();
  }
}

// Close auth menu when clicking outside
document.addEventListener('click', e => {
  const wrap = document.getElementById('auth-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('auth-menu').style.display = 'none';
  }
});

async function signIn() {
  const { error } = await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: SITE_URL }
  });
  if (error) { console.error('Sign in error:', error); alert('Sign in failed: ' + error.message); }
}

async function signOut() {
  document.getElementById('auth-menu').style.display = 'none';
  await sbClient.auth.signOut();
  currentUser = null;
  updateAuthUI(null);
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

async function handleSession(user, accessToken) {
  if (user && user.email !== ALLOWED_EMAIL) {
    currentUser = null;
    currentAccessToken = null;
    await sbClient.auth.signOut();
    updateAuthUI(null, null);
    if (!accessDeniedShown) {
      accessDeniedShown = true;
      showToast('Access restricted — this collection is private.');
    }
    return;
  }
  accessDeniedShown = false;
  updateAuthUI(user || null, accessToken || null);
}

// Listen for auth state changes (handles redirect back from Google)
sbClient.auth.onAuthStateChange((_event, session) => {
  handleSession(session?.user || null, session?.access_token || null);
});

// Check existing session on load
sbClient.auth.getSession().then(({ data: { session } }) => {
  handleSession(session?.user || null, session?.access_token || null);
});

async function sbFetch(path, options = {}) {
  // Use cached session token if available, otherwise fall back to anon key
  const authToken = currentAccessToken || SB_KEY;

  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers,
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase error ${res.status}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── Sync status UI ──
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const icons = { syncing: 'ti-loader-2', ok: 'ti-cloud-check', error: 'ti-cloud-exclamation', offline: 'ti-cloud-off' };
  const colors = { syncing: 'var(--text3)', ok: 'var(--green)', error: 'var(--red)', offline: 'var(--amber)' };
  const spin = state === 'syncing' ? 'style="animation:spin 1s linear infinite"' : '';
  el.innerHTML = `<i class="ti ${icons[state]}" ${spin}></i><span>${msg}</span>`;
  el.style.color = colors[state];
}

// ── Load from Supabase ──
async function load() {
  // First load from localStorage as immediate fallback
  try {
    const raw = JSON.parse(localStorage.getItem('reelvault_v4') || 'null');
    if (raw) { films = raw.films || []; boxSets = raw.boxSets || []; }
  } catch(e) {}
  films.forEach(f => { if (!f.type) f.type = 'Film'; });

  setSyncStatus('syncing', 'Syncing…');
  render();

  try {
    const [sbBoxSets, sbItems] = await Promise.all([
      sbFetch('box_sets?select=*&order=name'),
      sbFetch('items?select=*&order=added.desc'),
    ]);

    boxSets = sbBoxSets.map(r => ({ id: r.id, name: r.name }));
    films = sbItems.map(r => ({
      id: r.id,
      title: r.title,
      year: r.year,
      type: r.type || 'Film',
      format: r.format,
      wanted: r.wanted,
      watchlist: r.watchlist,
      favourite: r.favourite,
      boxsetId: r.boxset_id,
      added: r.added,
      genre: r.genre || '',
      cast: r.cast || '',
      poster: r.poster || '',
    }));

    saveLocal();
    setSyncStatus('ok', 'Synced');
    render();
  } catch(e) {
    console.error('Load error:', e);
    setSyncStatus('error', 'Sync failed');
    // Fall back to sample data if nothing in localStorage either
    if (!films.length) loadSampleData();
  }
}

// ── Save to localStorage (fast local cache) ──
function saveLocal() {

// ── Upsert a single film to Supabase ──
async function saveFilmRemote(f) {
  await sbFetch('items', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({
      id: f.id,
      title: f.title,
      year: f.year || null,
      type: f.type || 'Film',
      format: f.format || null,
      wanted: f.wanted,
      watchlist: f.watchlist,
      favourite: f.favourite,
      boxset_id: f.boxsetId || null,
      added: f.added,
      genre: f.genre || null,
      cast: f.cast || null,
      poster: f.poster || null,
    }),
  });
}

// ── Delete a film from Supabase ──
async function deleteFilmRemote(id) {
  await sbFetch(`items?id=eq.${id}`, { method: 'DELETE' });
}

// ── Upsert a box set to Supabase ──
async function saveBoxSetRemote(bs) {
  await sbFetch('box_sets', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify({ id: bs.id, name: bs.name }),
  });
}

// ── Delete a box set from Supabase ──
async function deleteBoxSetRemote(id) {
  await sbFetch(`box_sets?id=eq.${id}`, { method: 'DELETE' });
}

// ── save() is now the main sync entry point ──
async function save(filmToSync, deletedFilmId, bsToSync, deletedBsId) {
  saveLocal();
  setSyncStatus('syncing', 'Saving…');
  try {
    if (deletedFilmId) await deleteFilmRemote(deletedFilmId);
    if (filmToSync)    await saveFilmRemote(filmToSync);
    if (deletedBsId)   await deleteBoxSetRemote(deletedBsId);
    if (bsToSync)      await saveBoxSetRemote(bsToSync);
    setSyncStatus('ok', 'Saved');
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error', 'Save failed');
  }
}

// ── Helpers ──
function bsName(id) { const b = boxSets.find(x => x.id === id); return b ? b.name : ''; }
function bsFilms(id) { return films.filter(f => f.boxsetId === id); }

// ── Filtering ──
function getFiltered() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  activeYear = document.getElementById('year-sel').value || null;
  if (activeYear) window._decadeFilter = null;
  return films
    .filter(f => {
      if (q && !f.title.toLowerCase().includes(q)) return false;
      if (activeFormat && f.format !== activeFormat) return false;
      if (activeYear && String(f.year) !== activeYear) return false;
      if (window._decadeFilter && (Math.floor((f.year||0) / 10) * 10) !== window._decadeFilter) return false;
      if (activeGenre && !(f.genre || '').toLowerCase().split(',').map(g=>g.trim()).includes(activeGenre.toLowerCase())) return false;
      if (activeCast && !(f.cast || '').toLowerCase().includes(activeCast.toLowerCase())) return false;
      if (activeFilter === 'owned')      return !f.wanted;
      if (activeFilter === 'wanted')     return f.wanted;
      if (activeFilter === 'watchlist')  return f.watchlist;
      if (activeFilter === 'favourites') return f.favourite;
      if (activeFilter === 'boxsets')    return !!f.boxsetId;
      if (activeFilter === 'films')      return !f.wanted && f.type === 'Film';
      if (activeFilter === 'tvshows')    return !f.wanted && f.type === 'TV Show';
      return !f.wanted;
    })
    .sort((a, b) => {
      const s = document.getElementById('sort-sel').value;
      if (s === 'title') return sortTitle(a.title).localeCompare(sortTitle(b.title));
      if (s === 'year')  return (b.year||0) - (a.year||0);
      return b.added - a.added;
    });
}

function populateYearDropdown() {
  const sel = document.getElementById('year-sel');
  const current = sel.value;
  const years = [...new Set(films.map(f => f.year).filter(Boolean))].sort((a,b) => b - a);
  sel.innerHTML = '<option value="">All years</option>' +
    years.map(y => `<option value="${y}"${String(y) === current ? ' selected' : ''}>${y}</option>`).join('');
}

    tvshows:    films.filter(f=>!f.wanted && f.type==='TV Show').length,
    wanted:     films.filter(f=>f.wanted).length,
    watchlist:  films.filter(f=>f.watchlist).length,
    favourites: films.filter(f=>f.favourite).length,
    boxsets:    boxSets.length,
  };
  const fmtCounts = {};
  ['DVD','Blu-Ray','4K','3D'].forEach(fmt => { fmtCounts[fmt] = films.filter(f=>!f.wanted && f.format===fmt).length; });

  const libFilters = [
    ['owned',      'ti-stack-2',      'Owned'],
    ['films',      'ti-movie',        'Films'],
    ['tvshows',    'ti-device-tv',    'TV Shows'],
    ['wanted',     'ti-shopping-cart','Wanted'],
    ['watchlist',  'ti-bookmark',     'Watchlist'],

    ['boxsets',    'ti-package',      'Box sets'],
  ];

  let html = '<div class="sb-section"><div class="sb-title">Library</div>';
  libFilters.forEach(([key, icon, label]) => {
    const on = activeFilter === key ? 'active' : '';
    html += `<button class="sb-btn ${on}" onclick="setFilter('${key}')">
      <i class="ti ${icon}"></i><span class="sb-btn-label">${label}</span>
      <span class="sb-count">${counts[key]}</span>
    </button>`;
  });
  html += '</div>';

  // Format section — independent of genre filter
  html += '<div class="sb-section"><div class="sb-title">Format</div>';
  [['DVD','ti-disc'],['Blu-Ray','ti-disc'],['4K','ti-disc'],['3D','ti-disc']].forEach(([fmt, icon]) => {
    const fkey = fmt.toLowerCase().replace('-','').replace(' ','');
    const on = activeFormat === fmt ? 'active' : '';
    html += `<button class="sb-btn ${on}" id="fmt-${fkey}" onclick="toggleFormat('${fmt}')">
      <i class="ti ${icon}"></i><span class="sb-btn-label">${fmt}</span>
      <span class="sb-count">${fmtCounts[fmt]}</span>
    </button>`;
  });
  html += '</div>';

  // Genre section — only show if any films have genre data
  const genreMap = {};
  films.filter(f => !f.wanted).forEach(f => {
    if (!f.genre) return;
    f.genre.split(',').forEach(g => {
      const name = g.trim();
      if (name) genreMap[name] = (genreMap[name] || 0) + 1;
    });
  });
  const topGenres = Object.entries(genreMap).sort((a,b) => b[1]-a[1]).slice(0, 12);
  if (topGenres.length) {
    html += '<div class="sb-section"><div class="sb-title">Genre</div>';
    topGenres.forEach(([genre, count]) => {
      const on = activeGenre === genre ? 'active' : '';
      html += `<button class="sb-btn ${on}" onclick="setGenre('${genre.replace(/'/g,"\\'")}')">
        <i class="ti ti-theater"></i><span class="sb-btn-label">${genre}</span>
        <span class="sb-count">${count}</span>
      </button>`;
    });
    html += '</div>';
  }

  // Actor search section
  html += '<div class="sb-section"><div class="sb-title">Actor</div>';
  html += `<div class="sb-search">
    <i class="ti ti-user"></i>
    <input id="sb-actor-input" type="text" placeholder="Search by actor…" oninput="onActorSearch(this.value)" autocomplete="off" value="${(activeCast||'').replace(/"/g,'&quot;')}" class="${activeCast ? 'has-value' : ''}">
    ${activeCast ? `<button class="sb-search-clear" onclick="setCast(null)" title="Clear"><i class="ti ti-x"></i></button>` : ''}
  </div>`;
  html += '</div>';

  document.getElementById('sidebar').innerHTML = html;
}

// ── Render list ──
function renderList() {
  const wrap = document.getElementById('list-wrap');
  const pagerEl = document.getElementById('pager-wrap');

  // Active filter chips (format / genre / cast)
  const chips = [];
  if (activeFormat) chips.push(`<div class="filter-chip"><i class="ti ti-disc"></i>${activeFormat}<button onclick="toggleFormat('${activeFormat}')"><i class="ti ti-x"></i></button></div>`);
  if (activeGenre)  chips.push(`<div class="filter-chip"><i class="ti ti-theater"></i>${activeGenre}<button onclick="setGenre('${activeGenre.replace(/'/g,"\\'")}')"><i class="ti ti-x"></i></button></div>`);
  if (activeCast)   chips.push(`<div class="filter-chip"><i class="ti ti-user"></i>${activeCast}<button onclick="setCast('${activeCast.replace(/'/g,"\\'")}')"><i class="ti ti-x"></i></button></div>`);
  document.getElementById('filter-chips').innerHTML = chips.length ? `<div class="filter-chips">${chips.join('')}</div>` : '';

  // Box sets grouped view
  if (activeFilter === 'boxsets') {
    if (!boxSets.length) {
      wrap.innerHTML = `<div class="empty"><i class="ti ti-package"></i><p>No box sets yet. Create one when adding a film.</p></div>`;
      pagerEl.innerHTML = ''; return;
    }
    const cards = boxSets.map(bs => {
      const members = bsFilms(bs.id).sort((a,b) => (a.year||0)-(b.year||0) || sortTitle(a.title).localeCompare(sortTitle(b.title)));
      const rows = members.length
        ? members.map(f => filmRowHtml(f)).join('')
        : `<tr><td colspan="6" style="padding:12px 16px;color:var(--text3);font-size:13px">No items in this set yet.</td></tr>`;
      return `<div class="bs-group-card">
        <div class="bs-group-head">
          <i class="ti ti-package"></i>
          <span class="bs-group-name">${bs.name}</span>
          <span class="bs-group-meta">${members.length} film${members.length!==1?'s':''}</span>
          ${isAdmin() ? `<button class="bs-group-edit" onclick="openEditBs('${bs.id}')" title="Edit box set"><i class="ti ti-edit"></i></button>` : ''}
        </div>
        <div class="table-wrap" style="border-radius:0;border:none">
          <table>${getTableHead()}<tbody>${rows}</tbody></table>
        </div>
      </div>`;
    }).join('');
    wrap.innerHTML = `<div class="bs-groups">${cards}</div>`;
    pagerEl.innerHTML = `<div class="pager"><span>${boxSets.length} box set${boxSets.length!==1?'s':''}</span><span></span></div>`;
    return;
  }

  // Normal paginated list
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  if (currentPage > totalPages) currentPage = totalPages;
  const slice = filtered.slice((currentPage-1)*perPage, currentPage*perPage);

  if (!slice.length) {
    wrap.innerHTML = `<div class="empty"><i class="ti ti-movie-off"></i><p>No items match your filter.</p></div>`;
    document.getElementById('pager-wrap-top').innerHTML = '';
    pagerEl.innerHTML = ''; return;
  }

  wrap.innerHTML = `<div class="table-wrap"><table>${getTableHead()}<tbody>${slice.map(filmRowHtml).join('')}</tbody></table></div>`;

  const perPageSel = `<select class="ctrl" onchange="setPerPage(this.value)" title="Items per page" style="padding:5px 8px;font-size:12px">
    ${[15,25,50,100].map(n => `<option value="${n}"${n===perPage?' selected':''}>${n} per page</option>`).join('')}
  </select>`;

  if (totalPages <= 1) {
    const simpleInfo = `<div class="pager"><span>${filtered.length} item${filtered.length!==1?'s':''}</span>${perPageSel}</div>`;
    document.getElementById('pager-wrap-top').innerHTML = simpleInfo;
    pagerEl.innerHTML = simpleInfo;
    return;
  }

  let pgBtns = '';
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 9 && i > 2 && i < totalPages-1 && Math.abs(i-currentPage) > 1) {
      if (i===3||i===totalPages-2) pgBtns += `<span style="padding:0 4px;color:var(--text3)">…</span>`;
      continue;
    }
    pgBtns += `<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  const pagerHtml = `<div class="pager">
    <span>${filtered.length} item${filtered.length!==1?'s':''}</span>
    <div class="pages">
      <button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}><i class="ti ti-chevron-left"></i></button>
      ${pgBtns}
      <button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}><i class="ti ti-chevron-right"></i></button>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="color:var(--text2);font-size:13px">Page ${currentPage} of ${totalPages}</span>
      ${perPageSel}
    </div>
  </div>`;

  document.getElementById('pager-wrap-top').innerHTML = pagerHtml;
  pagerEl.innerHTML = pagerHtml;
}

function render() { renderStats(); renderSidebar(); populateYearDropdown(); renderList(); }
function goPage(p) { currentPage = p; renderList(); }
function setPerPage(n) { perPage = parseInt(n); currentPage = 1; renderList(); }

// ── Filters ──
function setFilter(f) {
  activeFilter = f; activeFormat = null; activeGenre = null; activeCast = null; window._decadeFilter = null; currentPage = 1; closeDrawer(); render();
}
function toggleFormat(fmt) {
  activeFormat = activeFormat === fmt ? null : fmt;
  currentPage = 1; closeDrawer(); render();
}
function setGenre(genre) {
  activeGenre = activeGenre === genre ? null : genre;
  currentPage = 1; closeDrawer(); render();
}
function setCast(actor) {
  activeCast = (actor && activeCast !== actor) ? actor : null;
  currentPage = 1; closeDrawer(); render();
}
function onActorSearch(val) {
  const trimmed = val.trim();
  activeCast = trimmed || null;
  currentPage = 1;
  // Re-render list and stats but keep sidebar input focused — don't full render()
  renderStats();
  renderList();
  // Update input styling and clear button without clobbering the input
  const input = document.getElementById('sb-actor-input');
  const clearBtn = document.querySelector('.sb-search .sb-search-clear');
  if (input) input.classList.toggle('has-value', !!trimmed);
  if (clearBtn) clearBtn.style.display = trimmed ? '' : 'none';
}
function toggle(id, field) {
  if (!isAdmin()) return;
  const f = films.find(x => x.id === id);
  if (f) { f[field] = !f[field]; save(f); render(); }
}

// ── Box set search picker (inside film modal) ──
function renderBsSelected() {
  const el = document.getElementById('bs-selected-display');
  if (!filmModalBsId) { el.innerHTML = ''; return; }
  const bs = boxSets.find(x => x.id === filmModalBsId);
  el.innerHTML = bs
    ? `<div class="bs-selected-chip"><i class="ti ti-package"></i>${bs.name}<button onclick="clearBsSelection()" title="Remove"><i class="ti ti-x"></i></button></div>`
    : '';
}

function clearBsSelection() {
  filmModalBsId = null;
  document.getElementById('bs-search-input').value = '';
  document.getElementById('bs-search-results').innerHTML = '';
  renderBsSelected();
}

function onBsSearch() {
  const q = (document.getElementById('bs-search-input').value || '').trim().toLowerCase();
  const wrap = document.getElementById('bs-search-results');
  if (!q) { wrap.innerHTML = ''; return; }

  const matches = boxSets.filter(bs => bs.name.toLowerCase().includes(q));
  const exactMatch = boxSets.some(bs => bs.name.toLowerCase() === q);
  let html = '';

  if (matches.length) {
    html += matches.map(bs =>
      `<div class="bs-search-item" onclick="pickBs('${bs.id}')"><i class="ti ti-package"></i>${bs.name}</div>`
    ).join('');
  }

  if (!exactMatch) {
    const display = document.getElementById('bs-search-input').value.trim();
    html += `<div class="bs-search-item create" onclick="createAndPickBs()"><i class="ti ti-plus"></i>Create "${display}"</div>`;
  }

  wrap.innerHTML = html ? `<div class="bs-search-results">${html}</div>` : '';
}

function pickBs(id) {
  filmModalBsId = id;
  document.getElementById('bs-search-input').value = '';
  document.getElementById('bs-search-results').innerHTML = '';
  renderBsSelected();
}

function createAndPickBs() {
  const name = document.getElementById('bs-search-input').value.trim();
  if (!name) return;
  const id = 'bs' + Date.now();
  const bs = { id, name };
  boxSets.push(bs);
  save(null, null, bs);
  pickBs(id);
}

  const posterEl = item.poster
    ? `<img src="${item.poster}" alt="" class="tmdb-selected-poster">`
    : `<div class="tmdb-selected-poster-blank"><i class="ti ti-photo"></i></div>`;
  const meta = [item.year, item.type, item.genre].filter(Boolean).join(' · ');
  return `<div class="tmdb-selected">
    ${posterEl}
    <div class="tmdb-selected-info">
      <div class="tmdb-selected-title">${item.title}</div>
      ${meta ? `<div class="tmdb-selected-meta">${meta}</div>` : ''}
      ${item.cast ? `<div class="tmdb-selected-meta" style="color:var(--text3)">${item.cast}</div>` : ''}
    </div>
    <button class="tmdb-clear" onclick="tmdbClear()" title="Clear"><i class="ti ti-x"></i></button>
  </div>`;
}

function tmdbClear() {

  document.getElementById('tmdb-btn').dataset.poster = '';
  document.getElementById('m-genre').value = '';
  document.getElementById('m-cast').value = '';
}

async function tmdbLookup(page = 1) {
  const title = document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').focus(); return; }

  const btn = document.getElementById('tmdb-btn');
  const resultsEl = document.getElementById('tmdb-results');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Searching…';
  resultsEl.style.display = 'block';

  if (page === 1) {
    resultsEl.innerHTML = '<div class="tmdb-loading"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Searching TMDB…</div>';
    resultsEl._tmdbItems = [];
  }

  try {
    const [movieRes, tvRes] = await Promise.all([
      fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&page=${page}`),
      fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}&page=${page}`),
    ]);
    const [movieData, tvData] = await Promise.all([movieRes.json(), tvRes.json()]);

    const movies = (movieData.results || []).map(r => ({
      id: r.id, mediaType: 'movie',
      title: r.title,
      year: r.release_date ? r.release_date.slice(0, 4) : null,
      poster: r.poster_path ? TMDB_IMG + r.poster_path : null,
      posterFull: r.poster_path ? TMDB_IMG_FULL + r.poster_path : null,
      overview: (r.overview || '').slice(0, 80),
    }));
    const shows = (tvData.results || []).map(r => ({
      id: r.id, mediaType: 'tv',
      title: r.name,
      year: r.first_air_date ? r.first_air_date.slice(0, 4) : null,
      poster: r.poster_path ? TMDB_IMG + r.poster_path : null,
      posterFull: r.poster_path ? TMDB_IMG_FULL + r.poster_path : null,
      overview: (r.overview || '').slice(0, 80),
    }));

    const newItems = [...movies, ...shows];
    const existingItems = resultsEl._tmdbItems || [];
    const allItems = [...existingItems, ...newItems];
    resultsEl._tmdbItems = allItems;

    if (!allItems.length) {
      resultsEl.innerHTML = '<div class="tmdb-loading">No results found.</div>';
      return;
    }

    const hasMore = movieData.total_pages > page || tvData.total_pages > page;

    resultsEl.innerHTML = allItems.map((item, i) => {
      const posterEl = item.poster
        ? `<img src="${item.poster}" alt="" class="tmdb-item-poster">`
        : `<div class="tmdb-item-poster-blank"><i class="ti ti-photo"></i></div>`;
      const badge = item.mediaType === 'tv'
        ? `<span style="font-size:10px;background:rgba(167,139,250,0.15);color:var(--purple);padding:1px 5px;border-radius:3px;margin-left:4px">TV</span>`
        : `<span style="font-size:10px;background:rgba(96,165,250,0.15);color:var(--blue);padding:1px 5px;border-radius:3px;margin-left:4px">Film</span>`;
      return `<div class="tmdb-item" onclick="tmdbSelect(${i})">
        ${posterEl}
        <div class="tmdb-item-info">
          <div class="tmdb-item-title">${item.title}${badge}</div>
          ${item.overview ? `<div class="tmdb-item-meta">${item.overview}…</div>` : ''}
        </div>
        ${item.year ? `<span class="tmdb-item-year">${item.year}</span>` : ''}
      </div>`;
    }).join('');

    if (hasMore) {
      resultsEl.innerHTML += `<div class="tmdb-item" onclick="tmdbLookup(${page + 1})" style="justify-content:center;color:var(--text2);gap:6px">
        <i class="ti ti-dots"></i> Load more results
      </div>`;
    }

  } catch(e) {
    resultsEl.innerHTML = '<div class="tmdb-loading">Lookup failed — check your connection.</div>';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-search"></i> Look up';
  }
}

async function tmdbSelect(i) {
  const resultsEl = document.getElementById('tmdb-results');
  const item = (resultsEl._tmdbItems || [])[i];
  if (!item) return;
  resultsEl.style.display = 'none';
  resultsEl._tmdbItems = null;

  // Fill basic fields immediately
  document.getElementById('m-title').value = item.title;
  if (item.year) document.getElementById('m-year').value = item.year;
  document.getElementById('m-type').value = item.mediaType === 'tv' ? 'TV Show' : 'Film';

  // Store poster URL on the button for saveFilm to pick up
  document.getElementById('tmdb-btn').dataset.poster = item.posterFull || '';

  // Show a "loading details" preview
  const wrap = document.getElementById('tmdb-selected-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = tmdbSelectedHtml({ ...item, genre: '…', cast: 'Loading details…' });

  // Fetch full details for genre + cast
  try {
    const endpoint = item.mediaType === 'tv'
      ? `https://api.themoviedb.org/3/tv/${item.id}?api_key=${TMDB_KEY}&append_to_response=credits`
      : `https://api.themoviedb.org/3/movie/${item.id}?api_key=${TMDB_KEY}&append_to_response=credits`;
    const res = await fetch(endpoint);
    const detail = await res.json();

    const genre = (detail.genres || []).map(g => g.name).join(', ');
    const credits = detail.credits || {};
    const cast = (credits.cast || []).slice(0, 5).map(c => c.name).join(', ');

    document.getElementById('m-genre').value = genre;
    document.getElementById('m-cast').value = cast;

    // Update preview
    wrap.innerHTML = tmdbSelectedHtml({
      title: item.title, year: item.year,
      type: item.mediaType === 'tv' ? 'TV Show' : 'Film',
      genre, cast, poster: item.posterFull,
    });
  } catch(e) {
    // Details failed — leave genre/cast blank, keep basic preview
    wrap.innerHTML = tmdbSelectedHtml({ ...item, genre: '', cast: '' });
  }
}

function saveFilm() {
  if (!isAdmin()) return;
  const title = document.getElementById('m-title').value.trim();
  if (!title) { document.getElementById('m-title').focus(); return; }
  const data = {
    title,
    year:      parseInt(document.getElementById('m-year').value) || null,
    type:      document.getElementById('m-type').value || 'Film',
    format:    document.getElementById('m-format').value || null,
    genre:     document.getElementById('m-genre').value.trim() || null,
    cast:      document.getElementById('m-cast').value.trim() || null,
    poster:    document.getElementById('tmdb-btn').dataset.poster || null,
    wanted:    document.getElementById('m-wanted').checked,
    watchlist: document.getElementById('m-watchlist').checked,
    favourite: document.getElementById('m-favourite').checked,
    boxsetId:  filmModalBsId,
  };
  let savedFilm;
  if (editFilmId) {
    const idx = films.findIndex(f => f.id === editFilmId);
    if (idx > -1) { films[idx] = { ...films[idx], ...data }; savedFilm = films[idx]; }
  } else {
    const newFilm = { id: Date.now(), ...data, added: Date.now() };
    films.unshift(newFilm);
    savedFilm = newFilm;
  }
  save(savedFilm); closeModal('film-modal'); render();
}

function deleteFilm() {
  if (!isAdmin()) return;
  const f = films.find(x => x.id === editFilmId);
  if (!f || !confirm(`Remove "${f.title}" from your collection?`)) return;
  films = films.filter(x => x.id !== editFilmId);
  save(null, editFilmId); closeModal('film-modal'); render();
}

function renderBsFilmsList(bsId) {
  const members = bsFilms(bsId).sort((a,b) => (a.year||0)-(b.year||0)||sortTitle(a.title).localeCompare(sortTitle(b.title)));
  const allFilms = films.filter(f => f.boxsetId !== bsId).sort((a,b) => sortTitle(a.title).localeCompare(sortTitle(b.title)));

  let html = '';
  // Films currently in the set
  if (members.length) {
    html += '<div class="bs-mgmt-list">';
    members.forEach(f => {
      html += `<div class="bs-mgmt-row">
        <span class="bs-mgmt-name">${f.title}</span>
        <span class="bs-mgmt-count">${f.year||''}</span>

    });
    html += '</div>';
  } else {
    html += '<p style="font-size:13px;color:var(--text3);margin-bottom:10px">No items in this set yet.</p>';
  }

  // Add films picker
  if (allFilms.length) {
    html += `<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px">Add items to this set</div>`;

// ── All actors view ──
let allActorsData = [];
function renderAllActors() {
  const actorMap = {};
  films.filter(f => !f.wanted).forEach(f => {
    if (!f.cast) return;
    f.cast.split(',').forEach(a => {
      const name = a.trim();
      if (name) actorMap[name] = (actorMap[name] || 0) + 1;
    });
  });
  allActorsData = Object.entries(actorMap).sort((a,b) => b[1]-a[1]);
  document.getElementById('all-actors-search').value = '';
  filterAllActors();
}

function filterAllActors() {
  const q = (document.getElementById('all-actors-search').value || '').toLowerCase();
  const entries = q ? allActorsData.filter(([name]) => name.toLowerCase().includes(q)) : allActorsData;
  const maxCount = entries.length ? entries[0][1] : 1;
  document.getElementById('all-actors-count').textContent = `${entries.length} actor${entries.length !== 1 ? 's' : ''}`;
  document.getElementById('all-actors-chart').innerHTML = entries.length
    ? entries.map(([name, count], i) => `
        <div class="cast-row" onclick="drillTo({cast:'${name.replace(/'/g,"\\'")}'})" title="Filter by ${name}">
          <span class="cast-rank">${i+1}</span>
          <span class="cast-name">${name}</span>
          <div class="cast-bar-wrap"><div class="cast-bar" style="width:${Math.round(count/maxCount*100)}%"></div></div>
          <span class="cast-count">${count}</span>
        </div>`).join('')
    : '<p style="color:var(--text3);font-size:13px;padding:20px 0">No actors match.</p>';
}

// ── Dashboard drill-through ──
function drillTo({ filter, format, year, genre, cast }) {
  activeFilter = filter || 'owned';
  activeFormat = format || null;
  activeYear   = year   || null;
  activeGenre  = genre  || null;
  activeCast   = cast   || null;
  currentPage  = 1;
  const yrSel = document.getElementById('year-sel');
  if (yrSel) yrSel.value = activeYear || '';
  switchView('collection');
  render();
}

// ── Dashboard ──
function renderDashboard() {
  if (typeof Chart === 'undefined') return;

  // All dashboard charts work from owned (non-wanted) items only,
  // so counts match what you see when you click through to the collection.
  const owned = films.filter(f => !f.wanted);

  // Colours
  const C = {
    DVD:     '#60a5fa',
    'Blu-Ray': '#4ade80',
    '4K':    '#a78bfa',
    '3D':    '#fb923c',
    Film:    '#60a5fa',
    'TV Show': '#a78bfa',
    owned:   '#e8c547',
    wanted:  '#fb923c',
  };

  function destroyChart(id) {
    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  }

  // ── Format donut ──
  destroyChart('format');
  destroyChart('genre');
  const fmts = ['DVD', 'Blu-Ray', '4K', '3D'];
  const fmtData = fmts.map(f => owned.filter(x => x.format === f).length);
  const fmtColors = fmts.map(f => C[f]);
  chartInstances['format'] = new Chart(document.getElementById('chart-format'), {
    type: 'doughnut',
    data: { labels: fmts, datasets: [{ data: fmtData, backgroundColor: fmtColors, borderWidth: 0, hoverOffset: 4 }] },
    options: {
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } } },
      animation: { duration: 500 },
      onClick(e, els) {
        if (!els.length) return;
        const fmt = fmts[els[0].index];
        drillTo({ filter: 'owned', format: fmt });
      }
    }
  });
  document.getElementById('chart-format').style.cursor = 'pointer';
  document.getElementById('legend-format').innerHTML = fmts.map((f,i) =>
    fmtData[i] > 0 ? `<div class="dash-legend-item" style="cursor:pointer" onclick="drillTo({filter:'owned',format:'${f}'})"><span class="dash-legend-dot" style="background:${fmtColors[i]}"></span>${f}<span class="dash-legend-val">${fmtData[i]}</span></div>` : ''
  ).join('') + `<div class="dash-legend-item" style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><span style="color:var(--text3)">No format</span><span class="dash-legend-val">${owned.filter(x=>!x.format).length}</span></div>`;

  // ── Type donut ──
  destroyChart('type');
  const types = ['Film', 'TV Show'];
  const typeFilterKeys = { 'Film': 'films', 'TV Show': 'tvshows' };
  const typeData = types.map(t => owned.filter(x => x.type === t).length);
  const typeColors = types.map(t => C[t]);
  chartInstances['type'] = new Chart(document.getElementById('chart-type'), {
    type: 'doughnut',
    data: { labels: types, datasets: [{ data: typeData, backgroundColor: typeColors, borderWidth: 0, hoverOffset: 4 }] },
    options: {
      cutout: '68%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } } },
      animation: { duration: 500 },
      onClick(e, els) {
        if (!els.length) return;
        const t = types[els[0].index];
        drillTo({ filter: typeFilterKeys[t] });
      }
    }
  });
  document.getElementById('chart-type').style.cursor = 'pointer';
  document.getElementById('legend-type').innerHTML = types.map((t,i) =>
    `<div class="dash-legend-item" style="cursor:pointer" onclick="drillTo({filter:'${typeFilterKeys[t]}'})"><span class="dash-legend-dot" style="background:${typeColors[i]}"></span>${t}<span class="dash-legend-val">${typeData[i]}</span></div>`
  ).join('');

  // ── By decade bar ──
  destroyChart('year');
  const yearMap = {};
  films.filter(f => !f.wanted).forEach(f => { if (f.year) { yearMap[f.year] = (yearMap[f.year]||0) + 1; } });
  const decadeMap = {};
  Object.entries(yearMap).forEach(([yr, count]) => {
    const decade = Math.floor(parseInt(yr) / 10) * 10;
    decadeMap[decade] = (decadeMap[decade] || 0) + count;
  });
  const decades = Object.keys(decadeMap).sort();
  const decadeCounts = decades.map(d => decadeMap[d]);
  const decadeBreakdown = {};
  Object.entries(yearMap).forEach(([yr, count]) => {
    const decade = Math.floor(parseInt(yr) / 10) * 10;
    if (!decadeBreakdown[decade]) decadeBreakdown[decade] = [];
    decadeBreakdown[decade].push([parseInt(yr), count]);
  });
  Object.values(decadeBreakdown).forEach(arr => arr.sort((a,b) => a[0]-b[0]));

  chartInstances['year'] = new Chart(document.getElementById('chart-year'), {
    type: 'bar',
    data: { labels: decades.map(d => `${d}s`), datasets: [{ data: decadeCounts, backgroundColor: 'rgba(232,197,71,0.7)', borderColor: '#e8c547', borderWidth: 1, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => `${ctx[0].label}`,
            label: ctx => ` ${ctx.raw} item${ctx.raw!==1?'s':''}`,
            afterBody: ctx => {
              const decade = parseInt(decades[ctx[0].dataIndex]);
              const breakdown = (decadeBreakdown[decade] || []).map(([yr, n]) => `  ${yr}: ${n}`);
              return breakdown.length > 1 ? ['', ...breakdown] : [];
            }
          }
        }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#5a5a65', font: { size: 12 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#5a5a65', font: { size: 11 }, stepSize: 1 }, beginAtZero: true }
      },
      animation: { duration: 500 },
      onClick(e, els) {
        if (!els.length) return;
        const decade = parseInt(decades[els[0].index]);
        const yearsInDecade = (decadeBreakdown[decade] || []).map(([yr]) => String(yr));
        if (yearsInDecade.length === 1) {
          drillTo({ filter: 'owned', year: yearsInDecade[0] });
        } else {
          window._decadeFilter = decade;
          activeFilter = 'owned'; activeFormat = null; activeGenre = null; activeCast = null;
          activeYear = null; currentPage = 1;
          document.getElementById('year-sel').value = '';
          switchView('collection');
          render();
        }
      }
    }
  });
  document.getElementById('chart-year').style.cursor = 'pointer';

  // ── Top genres bar chart ──
  destroyChart('genre');
  const genreMap = {};
  owned.forEach(f => {
    if (!f.genre) return;
    f.genre.split(',').forEach(g => {
      const name = g.trim();
      if (name) genreMap[name] = (genreMap[name] || 0) + 1;
    });
  });
  const genreEntries = Object.entries(genreMap).sort((a,b) => b[1]-a[1]);
  const genreLabels = genreEntries.map(e => e[0]);
  const genreCounts = genreEntries.map(e => e[1]);
  const genreColors = ['#e8c547','#60a5fa','#4ade80','#a78bfa','#fb923c','#f472b6','#f87171','#34d399','#38bdf8','#facc15','#c084fc','#fb7185','#a3e635','#67e8f9','#fda4af'];

  if (genreLabels.length) {
    // Adjust canvas height based on number of genres
    document.querySelector('#chart-genre').parentElement.style.height = Math.max(180, genreLabels.length * 28) + 'px';
    chartInstances['genre'] = new Chart(document.getElementById('chart-genre'), {
      type: 'bar',
      data: {
        labels: genreLabels,
        datasets: [{ data: genreCounts, backgroundColor: genreColors.slice(0, genreLabels.length), borderWidth: 0, borderRadius: 4 }]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.raw} title${ctx.raw!==1?'s':''}` } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#5a5a65', font: { size: 11 }, stepSize: 1 }, beginAtZero: true },
          y: { grid: { display: false }, ticks: { color: '#9a99a3', font: { size: 12 } } }
        },
        animation: { duration: 500 },
        onClick(e, els) {
          if (!els.length) return;
          drillTo({ genre: genreLabels[els[0].index] });
        }
      }
    });
    document.getElementById('chart-genre').style.cursor = 'pointer';
  } else {
    document.getElementById('chart-genre').parentElement.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:20px 0">No genre data yet — use the TMDB lookup when adding items.</p>';
  }

  // ── Top actors list (>5 films) ──
  const actorMap = {};
  owned.forEach(f => {
    if (!f.cast) return;
    f.cast.split(',').forEach(a => {
      const name = a.trim();
      if (name) actorMap[name] = (actorMap[name] || 0) + 1;
    });
  });
  const actorEntries = Object.entries(actorMap).filter(([,n]) => n > 5).sort((a,b) => b[1]-a[1]).slice(0, 10);
  const castEl = document.getElementById('cast-chart');
  if (actorEntries.length) {
    const maxCount = actorEntries[0][1];
    castEl.innerHTML = actorEntries.map(([name, count], i) => `
      <div class="cast-row" onclick="drillTo({cast:'${name.replace(/'/g,"\\'")}'})" title="Filter by ${name}">
        <span class="cast-rank">${i+1}</span>
        <span class="cast-name">${name}</span>
        <div class="cast-bar-wrap"><div class="cast-bar" style="width:${Math.round(count/maxCount*100)}%"></div></div>
        <span class="cast-count">${count}</span>
      </div>`).join('');
  } else {
    castEl.innerHTML = '<p style="color:var(--text3);font-size:13px;padding:20px 0">No cast data yet — use the TMDB lookup when adding items.</p>';
  }
}

// ── Sort key: strip leading English stop words for alphabetical ordering ──
const STOP_WORDS = /^(a |an |the )/i;
function sortTitle(title) { return (title || '').replace(STOP_WORDS, '').trim(); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function overlayClick(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

// ── Init ──
load();
render();
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
// ── Service Worker (offline support) ──
// Registered via blob URL so no separate .sw.js file is needed for a single-file deployment.
if ('serviceWorker' in navigator) {
  const CACHE = 'mediavault-v1';
  const PRECACHE = [
    location.href,
    'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap',
    'https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css',
    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js',
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js',
  ];

  const swCode = `
    const CACHE = '${CACHE}';
    const PRECACHE = ${JSON.stringify(PRECACHE)};

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE).then(cache =>
          Promise.allSettled(PRECACHE.map(url => cache.add(url).catch(() => {})))
        ).then(() => self.skipWaiting())
      );
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener('fetch', e => {
      const url = e.request.url;
      if (url.includes('supabase.co/rest') ||
          url.includes('supabase.co/auth') ||
          url.includes('themoviedb.org') ||
          url.includes('fonts.gstatic.com')) {
        return;
      }
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(response => {
            if (e.request.method === 'GET' && response.ok) {
              const clone = response.clone();
              caches.open(CACHE).then(cache => cache.put(e.request, clone));
            }
            return response;
          }).catch(() => {
            if (e.request.mode === 'navigate') {
              return caches.match(location.href);
            }
          });
        })
      );
    });
  `;

  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(() => console.log('MediaVault: service worker registered (offline ready)'))
    .catch(e => console.warn('MediaVault: service worker registration failed', e));
}
</script>
